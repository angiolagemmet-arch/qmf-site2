backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Info"
        name: "general"
        file: "data/general.json"
        fields:
          - {label: "Business Name", name: "name", widget: "string"}
          - {label: "Phone Number", name: "phone", widget: "string"}
          - {label: "Email Address", name: "email", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Website URL", name: "website", widget: "string"}
          - {label: "Hero Headline", name: "headline", widget: "string"}
          - {label: "Hero Description", name: "description", widget: "text"}
          - {label: "Business Hours", name: "hours", widget: "string"}
          - {label: "About Text", name: "about", widget: "text"}
